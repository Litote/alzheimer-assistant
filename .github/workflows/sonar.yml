name: SonarCloud Analysis

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - 'build.gradle.kts'
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - 'front/**'
      - 'build.gradle.kts'
      - '.github/**'

concurrency:
  group: front-sonar-${{ github.ref }}
  cancel-in-progress: true

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Detect code changes
        id: detect-changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "")
          fi
          if echo "$CHANGED" | grep -qE '\.(dart|yaml|yml|toml|kts|gradle)$'; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run checks and tests with coverage
        run: ./gradlew check

      - name: SonarCloud analysis
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        if: env.SONAR_TOKEN != '' && steps.detect-changes.outputs.has_code_changes == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./gradlew sonar \
              -Dsonar.pullrequest.key="$PR_NUMBER" \
              -Dsonar.pullrequest.branch="$PR_BRANCH" \
              -Dsonar.pullrequest.base="$PR_BASE"
          else
            ./gradlew sonar
          fi
