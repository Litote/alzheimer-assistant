name: Front — TestFlight Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]*.*'

concurrency:
  group: front-testflight-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: front

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      # ── Signing ─────────────────────────────────────────────────────────────
      # Import the distribution certificate into a temporary keychain.
      # Manual signing (CODE_SIGN_STYLE=Manual) is used to avoid Xcode creating
      # a new certificate on every run via -allowProvisioningUpdates.
      # The keychain is deleted in the cleanup step regardless of success/failure.
      - name: Import distribution certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm /tmp/cert.p12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # A .mobileprovision file embeds a plain XML plist inside a CMS envelope.
          # Python extracts it directly without needing to decode the CMS signature.
          UUID=$(grep -aEio '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' "$PP_PATH" | head -1)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision

      # ── App Store Connect API key ────────────────────────────────────────────
      # Still needed for xcrun altool upload (authentication to App Store Connect).
      - name: Store App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      # ── App secrets ─────────────────────────────────────────────────────────
      - name: Create secrets.json
        env:
          ADK_BASE_URL: ${{ secrets.ADK_BASE_URL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          cat > secrets.json <<EOF
          {
            "ADK_BASE_URL": "$ADK_BASE_URL",
            "ELEVENLABS_API_KEY": "$ELEVENLABS_API_KEY",
            "ELEVENLABS_VOICE_ID": "$ELEVENLABS_VOICE_ID"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      # ── Build ────────────────────────────────────────────────────────────────
      # --no-codesign: Flutter writes dart defines to Generated.xcconfig but
      # does not sign. Signing happens in the xcodebuild archive step below.
      - name: Build Flutter iOS (release, no codesign)
        run: flutter build ios --release --no-codesign --dart-define-from-file=secrets.json

      # ── Archive ─────────────────────────────────────────────────────────────
      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_UUID=$(grep -aEio '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' "$PP_PATH" | head -1)

          [ -z "$PROFILE_UUID" ] && echo "ERROR: could not extract UUID from provisioning profile" && exit 1

          set -o pipefail
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/xcodebuild-archive.log | xcpretty || {
            echo "--- xcodebuild archive FAILED — error lines ---"
            grep -E "(error:|ARCHIVE FAILED|The following|build commands failed)" /tmp/xcodebuild-archive.log || true
            exit 1
          }

      # ── Export IPA ───────────────────────────────────────────────────────────
      - name: Export IPA
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_UUID=$(grep -aEio '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' "$PP_PATH" | head -1)
          PROFILE_NAME=$(python3 -c "import re,sys; d=open(sys.argv[1],'rb').read(); print(re.search(rb'<key>Name</key>\s*<string>([^<]+)</string>',d).group(1).decode())" "$PP_PATH")

          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>org.litote.alzheimerAssistant</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/Runner-ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            | xcpretty

      # ── Upload to TestFlight ─────────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find /tmp/Runner-ipa -name "*.ipa" | head -1)
          echo "IPA found: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "Export directory contents:"
            ls -la /tmp/Runner-ipa/ || echo "(empty or missing)"
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ── Cleanup ──────────────────────────────────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain || true
