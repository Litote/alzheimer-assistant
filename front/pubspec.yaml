name: alzheimer_assistant
description: 'Alzheimer Assistant - Voice-based assistant app'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1

  # Routing
  go_router: ^17.1.0

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # UI
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.9

  # Voice input
  speech_to_text: ^7.0.0

  # Microphone streaming (raw PCM 16kHz for ADK Live)
  record: ^6.0.0

  # WebSocket transport (ADK Live bidi streaming)
  web_socket_channel: ^3.0.2

  # Audio playback — buffered WAV mode (BufferedAudioPlayerService)
  audioplayers: ^6.1.0

  # Real-time PCM Audio playback — PCM streaming mode (PcmStreamingAudioPlayerService)
  # Pinned to fork until androidAudioUsage PR is merged upstream:
  # https://github.com/chipweinberger/flutter_pcm_sound
  flutter_pcm_sound:
    git:
      url: https://github.com/zigzago/flutter_pcm_sound.git
      ref: 85eb9c78ec3940c74579b430ef19a0dd678c539c

  # File system utilities (WAV temp file for BufferedAudioPlayerService)
  path_provider: ^2.1.5

  # Phone calls
  flutter_contacts: ^2.0.1
  flutter_phone_direct_caller: ^2.1.1

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  logger: ^2.6.1
  shared_preferences: ^2.3.2

  # Client-side TTS (text mode with reply_text)
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.0
  json_serializable: ^6.13.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: MaterialIcons
      fonts:
        - asset: assets/fonts/MaterialIcons-Regular.otf
