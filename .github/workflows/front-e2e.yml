name: Front — E2E Tests (iOS · Android · Web)

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front-e2e.yml'

concurrency:
  group: front-e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: front

jobs:
  # ── iOS Simulator ──────────────────────────────────────────────────────────
  e2e-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v6

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version-file: front/.flutter-version
          cache: true
          architecture: ARM64

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      # ── iOS Simulator ─────────────────────────────────────────────────────
      # Find the first available iPhone in the simulator list.
      # macos-latest includes Xcode and several pre-installed simulators.
      - name: Boot iOS Simulator
        id: boot_sim
        run: |
          # Find the UDID of the first available iPhone (not booted)
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devs in data['devices'].items():
            for d in devs:
              if 'iPhone' in d['name'] and d['isAvailable']:
                print(d['udid'])
                exit()
          ")
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

          # Open Simulator.app — required by Flutter to deploy
          # and establish the WebSocket connection to the Dart VM service
          open -a Simulator --args -CurrentDeviceUDID "$UDID"

          # Wait for the simulator to be ready
          xcrun simctl bootstatus "$UDID" -b

          # Disable auto-lock to prevent the simulator from locking
          # during the Xcode build (~2 min), which would prevent the
          # Dart VM service from starting (WebSocketChannelException: Connection refused)
          xcrun simctl spawn "$UDID" defaults write com.apple.springboard SBAutoLockTime -1
          xcrun simctl spawn "$UDID" defaults write com.apple.Preferences SBAutoLockDelay -1

      - name: Create secrets.json
        env:
          ADK_BASE_URL: ${{ secrets.ADK_BASE_URL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          cat > secrets.json <<EOF
          {
            "ADK_BASE_URL": "$ADK_BASE_URL",
            "ELEVENLABS_API_KEY": "$ELEVENLABS_API_KEY",
            "ELEVENLABS_VOICE_ID": "$ELEVENLABS_VOICE_ID"
          }
          EOF

      # ── E2E tests on simulator ────────────────────────────────────────────
      - name: E2E tests on iOS Simulator
        run: |
          flutter test integration_test/app_e2e_test.dart \
            -d "$SIMULATOR_UDID" \
            --dart-define-from-file=secrets.json \
            --reporter=github

      # ── Failure report: simulator screenshot ──────────────────────────────
      - name: Capture simulator screenshot on failure
        if: failure()
        run: |
          xcrun simctl io "$SIMULATOR_UDID" screenshot failure_screenshot.png || true

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ios-failure-screenshot
          path: front/failure_screenshot.png
          retention-days: 7

  # ── Android Emulator ───────────────────────────────────────────────────────
  #
  # Uses ubuntu-latest + KVM hardware acceleration.
  # Linux runners now support nested virtualisation — no macOS needed.
  # ubuntu-latest is ~10× cheaper and boots the emulator faster than macOS.
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # Checkout first so that the `front/` working-directory (set in defaults)
      # exists before any `run` step executes.
      - uses: actions/checkout@v6

      # KVM must be enabled before the emulator action runs.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Android SDK Gradle build requires a JDK
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version-file: front/.flutter-version
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Create secrets.json
        env:
          ADK_BASE_URL: ${{ secrets.ADK_BASE_URL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          cat > secrets.json <<EOF
          {
            "ADK_BASE_URL": "$ADK_BASE_URL",
            "ELEVENLABS_API_KEY": "$ELEVENLABS_API_KEY",
            "ELEVENLABS_VOICE_ID": "$ELEVENLABS_VOICE_ID"
          }
          EOF

      # The action boots an emulator, waits for it, then runs the script.
      # script runs from GITHUB_WORKSPACE (not from defaults.run.working-directory),
      # hence the explicit `cd front`.
      - name: E2E tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          # Each line of the script runs as a separate sh -c invocation,
          # so `cd` must be chained with && to stay in the same shell context.
          script: cd front && flutter test integration_test/app_e2e_test.dart -d emulator-5554 --dart-define-from-file=secrets.json --reporter=github

      # ── Failure report: ADB screenshot ────────────────────────────────────
      - name: Capture emulator screenshot on failure
        if: failure()
        run: adb exec-out screencap -p > failure_screenshot.png || true

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-android-failure-screenshot
          path: front/failure_screenshot.png
          retention-days: 7

  # ── Chrome (web) ───────────────────────────────────────────────────────────
  #
  # flutter test -d chrome is not yet supported for integration tests.
  # The supported approach is flutter drive with a ChromeDriver process.
  # test_driver/integration_test.dart is the standard driver entry point.
  # All platform-specific services (STT, TTS, phone) are replaced by fakes
  # so native plugins are never invoked at runtime.
  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version-file: front/.flutter-version
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Create secrets.json
        env:
          ADK_BASE_URL: ${{ secrets.ADK_BASE_URL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          cat > secrets.json <<EOF
          {
            "ADK_BASE_URL": "$ADK_BASE_URL",
            "ELEVENLABS_API_KEY": "$ELEVENLABS_API_KEY",
            "ELEVENLABS_VOICE_ID": "$ELEVENLABS_VOICE_ID"
          }
          EOF

      # ChromeDriver is pre-installed alongside Google Chrome on ubuntu-latest.
      # It must be started before flutter drive connects to it.
      - name: Start ChromeDriver
        run: chromedriver --port=4444 &

      - name: E2E tests on Chrome
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_e2e_test.dart \
            -d web-server \
            --headless \
            --dart-define-from-file=secrets.json
