name: Front — Update Golden Screenshots

# Triggered manually only:
# Actions → "Front — Update Golden Screenshots" → Run workflow
on:
  workflow_dispatch:

# Permission to write to the repository and open PRs
permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    working-directory: front

jobs:
  update-goldens:
    name: Generate & commit golden screenshots
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          # Check out the current branch (not the detached SHA)
          # so we can commit the generated goldens to it
          ref: ${{ github.head_ref || github.ref_name }}
          # Use PAT so that the PR created later triggers other workflows (GITHUB_TOKEN does not).
          token: ${{ secrets.GH_PAT }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            front/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('front/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate golden files
        run: flutter test test/golden/ --update-goldens --tags golden

      - name: Commit & open PR with goldens
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git add front/test/golden/goldens/

          if git diff --staged --quiet; then
            echo "✅ No changes in goldens."
          else
            CHANGED_FILES=$(git diff --staged --name-only)
            CHANGED=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')
            ORIGIN="${{ github.ref_name }}"
            BRANCH="chore/update-goldens-${ORIGIN//\//-}-$(date +%Y%m%d-%H%M%S)"
            FLUTTER_VERSION=$(flutter --version | head -1)
            REPO="${{ github.repository }}"
            PARENT=$(git rev-parse HEAD)
            BASE_TREE=$(git rev-parse HEAD^{tree})
            COMMIT_MSG="chore: update ${CHANGED} golden screenshot(s) [skip ci]

          Generated on macOS by github-actions[bot]
          ${FLUTTER_VERSION}"

            # Upload each changed file as a blob to GitHub and collect tree entries.
            # The GitHub API requires blobs to exist on its servers before creating a tree.
            TREE_ENTRIES_JSON="[]"
            while IFS= read -r file; do
              BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
                --method POST \
                -f "content=$(base64 < "$file" | tr -d '\n')" \
                -f "encoding=base64" \
                --jq '.sha')
              TREE_ENTRIES_JSON=$(echo "$TREE_ENTRIES_JSON" | jq \
                --arg path "$file" --arg sha "$BLOB_SHA" \
                '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
            done <<< "$CHANGED_FILES"

            # Create the tree on GitHub, inheriting unchanged files from the base tree
            TREE_SHA=$(jq -n \
              --arg base_tree "$BASE_TREE" \
              --argjson tree "$TREE_ENTRIES_JSON" \
              '{"base_tree": $base_tree, "tree": $tree}' | \
              gh api "repos/${REPO}/git/trees" --method POST --input - --jq '.sha')

            # Create a verified commit via the GitHub API (signed by GitHub natively).
            # Author/committer are set explicitly so the commit shows as
            # github-actions[bot] regardless of which token authenticates the call.
            COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
              --method POST \
              -f "message=${COMMIT_MSG}" \
              -f "tree=${TREE_SHA}" \
              -f "parents[]=${PARENT}" \
              -f "author[name]=github-actions[bot]" \
              -f "author[email]=41898282+github-actions[bot]@users.noreply.github.com" \
              -f "committer[name]=github-actions[bot]" \
              -f "committer[email]=41898282+github-actions[bot]@users.noreply.github.com" \
              --jq '.sha')

            # Create the branch ref pointing to the new signed commit
            gh api "repos/${REPO}/git/refs" \
              --method POST \
              -f "ref=refs/heads/${BRANCH}" \
              -f "sha=${COMMIT_SHA}"

            gh pr create \
              --title "chore: update ${CHANGED} golden screenshot(s)" \
              --body "Automated golden screenshot update triggered by workflow_dispatch.

          Generated on macOS · ${FLUTTER_VERSION}" \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH"
            echo "✅ ${CHANGED} golden(s) committed (verified) and PR opened."
          fi
