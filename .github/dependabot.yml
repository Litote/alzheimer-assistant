version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github-actions

  # ── Flutter / Dart (pub) ────────────────────────────────────────────────────
  - package-ecosystem: pub
    directory: /front
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - flutter
