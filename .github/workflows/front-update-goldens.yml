name: Front — Update Golden Screenshots

# Triggered manually only:
# Actions → "Front — Update Golden Screenshots" → Run workflow
on:
  workflow_dispatch:

# Permission to write to the repository and open PRs
permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    working-directory: front

jobs:
  update-goldens:
    name: Generate & commit golden screenshots
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          # Check out the current branch (not the detached SHA)
          # so we can commit the generated goldens to it
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version-file: front/.flutter-version
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            front/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('front/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate golden files
        run: flutter test test/golden/ --update-goldens --tags golden

      - name: Commit & open PR with goldens
        working-directory: .
        env:
          # PAT: used to trigger CI via gh workflow run (GITHUB_TOKEN cannot
          # trigger other workflow runs — GitHub restriction).
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # GITHUB_TOKEN: used for commit creation (GitHub auto-signs → Verified)
          # and PR creation (author = github-actions[bot], not zigzago).
          GH_TOKEN_GITHUB: ${{ github.token }}
        run: |
          git add front/test/golden/goldens/

          if git diff --staged --quiet; then
            echo "✅ No changes in goldens."
          else
            CHANGED_FILES=$(git diff --staged --name-only)
            CHANGED=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')
            ORIGIN="${{ github.ref_name }}"
            BRANCH="chore/update-goldens-${ORIGIN//\//-}-$(date +%Y%m%d-%H%M%S)"
            FLUTTER_VERSION=$(flutter --version | head -1)
            REPO="${{ github.repository }}"
            PARENT=$(git rev-parse HEAD)
            BASE_TREE=$(git rev-parse HEAD^{tree})
            COMMIT_MSG="chore: update ${CHANGED} golden screenshot(s)

          Generated on macOS by github-actions[bot]
          ${FLUTTER_VERSION}"

            # Upload each changed file as a blob to GitHub and collect tree entries.
            # The GitHub API requires blobs to exist on its servers before creating a tree.
            TREE_ENTRIES_JSON="[]"
            while IFS= read -r file; do
              BLOB_SHA=$(GH_TOKEN="$GH_TOKEN_GITHUB" gh api "repos/${REPO}/git/blobs" \
                --method POST \
                -f "content=$(base64 < "$file" | tr -d '\n')" \
                -f "encoding=base64" \
                --jq '.sha')
              TREE_ENTRIES_JSON=$(echo "$TREE_ENTRIES_JSON" | jq \
                --arg path "$file" --arg sha "$BLOB_SHA" \
                '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
            done <<< "$CHANGED_FILES"

            # Create the tree on GitHub, inheriting unchanged files from the base tree
            TREE_SHA=$(jq -n \
              --arg base_tree "$BASE_TREE" \
              --argjson tree "$TREE_ENTRIES_JSON" \
              '{"base_tree": $base_tree, "tree": $tree}' | \
              GH_TOKEN="$GH_TOKEN_GITHUB" gh api "repos/${REPO}/git/trees" --method POST --input - --jq '.sha')

            # Create a verified commit using GITHUB_TOKEN: GitHub auto-signs commits
            # created via its API when authenticated with the built-in token.
            # The PR author becomes github-actions[bot], so the human can approve.
            COMMIT_SHA=$(GH_TOKEN="$GH_TOKEN_GITHUB" gh api "repos/${REPO}/git/commits" \
              --method POST \
              -f "message=${COMMIT_MSG}" \
              -f "tree=${TREE_SHA}" \
              -f "parents[]=${PARENT}" \
              --jq '.sha')

            # Create the branch ref (PAT or GITHUB_TOKEN — attribution doesn't matter here)
            GH_TOKEN="$GH_TOKEN_GITHUB" gh api "repos/${REPO}/git/refs" \
              --method POST \
              -f "ref=refs/heads/${BRANCH}" \
              -f "sha=${COMMIT_SHA}"

            # Open the PR as github-actions[bot] so the human reviewer can approve it.
            GH_TOKEN="$GH_TOKEN_GITHUB" gh pr create \
              --title "chore: update ${CHANGED} golden screenshot(s)" \
              --body "Automated golden screenshot update triggered by workflow_dispatch.

          Generated on macOS · ${FLUTTER_VERSION}" \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH"

            # Trigger CI on the new branch using the PAT.
            # GITHUB_TOKEN cannot trigger other workflow runs (GitHub restriction),
            # so CI would not run automatically on the PR created above.
            # front-ci.yml has workflow_dispatch for exactly this purpose.
            gh workflow run front-ci.yml --ref "$BRANCH"

            echo "✅ ${CHANGED} golden(s) committed (verified), PR opened, CI triggered."
          fi
